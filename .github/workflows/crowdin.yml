name: Crowdin Action

on:
  push:
    branches: [ feat/i18n ]

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: feat/i18n

      - name: Crowdin Sync
        uses: crowdin/github-action@v2.7.0
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: 'New Crowdin Translations'
          pull_request_body: 'New Crowdin translations by [Crowdin GH Action](https://github.com/crowdin/github-action)'
          pull_request_base_branch_name: 'feat/i18n'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Checkout Crowdin PR branch
        run: |
          git fetch origin l10n_crowdin_translations
          git checkout l10n_crowdin_translations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install

      - name: Compile Lingui catalogs
        run: pnpm lingui compile

      - name: Commit compiled messages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add locales/*/messages.*
          git commit -m "Compile Lingui catalogs" || echo "No changes to commit"
          git push origin l10n_crowdin_translations
